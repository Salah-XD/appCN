name: Release

# Driven by Changesets. Two modes:
#   1. push to main with pending .changeset/*.md   → opens "Version Packages" PR
#   2. push to main with NO pending changesets     → publishes every workspace
#      package whose version is ahead of what is on npm
#
# Manual dry-run via workflow_dispatch remains available for break-glass:
# rebuilds, packs, and inspects tarballs without publishing.
on:
  push:
    branches: [main]
    # Allowlist — only run when files that actually affect a publish change.
    # Pure docs / web / showcase / config commits don't trigger the env gate.
    paths:
      - 'packages/ui/**'
      - 'packages/cli/**'
      - 'packages/mcp/**'
      - '.changeset/**'
      - '.github/workflows/release.yml'
  workflow_dispatch:
    inputs:
      dry-run:
        description: 'Dry-run only (pack + inspect, skip publish)'
        required: false
        default: 'true'
        type: boolean

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write       # Changesets opens/updates the Version Packages PR
  pull-requests: write  # same
  id-token: write       # npm OIDC trusted publishing (post-Step-6 migration)

jobs:
  release:
    name: Version or publish
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: npm-publish
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Changesets reads tags + full history for changelogs

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Build publishable packages
        run: pnpm --filter @app-cn/cli --filter @app-cn/mcp build

      - name: Create Release PR or publish
        id: changesets
        uses: changesets/action@v1
        with:
          version: pnpm version-packages
          publish: pnpm release
          commit: 'chore(release): version packages'
          title: 'chore(release): version packages'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Summarize published packages
        if: steps.changesets.outputs.published == 'true'
        run: |
          echo "## Published" >> "$GITHUB_STEP_SUMMARY"
          echo '${{ steps.changesets.outputs.publishedPackages }}' | \
            node -e 'const pkgs=JSON.parse(require("fs").readFileSync(0,"utf8"));for(const p of pkgs){console.log(`- \`${p.name}@${p.version}\``)}' \
            >> "$GITHUB_STEP_SUMMARY"

      # When @app-cn/mcp was just published to npm, mirror it to the official MCP
      # Registry. The branded `digital.shineup` namespace is DNS-verified, so it
      # can't use GitHub OIDC — it signs with the Ed25519 key stored as a secret.
      - name: Publish to the MCP Registry
        if: steps.changesets.outputs.published == 'true' && contains(steps.changesets.outputs.publishedPackages, '"@app-cn/mcp"')
        env:
          MCP_REGISTRY_DNS_KEY: ${{ secrets.MCP_REGISTRY_DNS_KEY }}
          MCP_PUBLISHER_VERSION: v1.7.9
        run: |
          set -euo pipefail
          if [ -z "${MCP_REGISTRY_DNS_KEY:-}" ]; then
            echo "::warning::MCP_REGISTRY_DNS_KEY secret not set — skipping MCP Registry publish (npm publish already succeeded). Add the secret to enable auto-listing."
            exit 0
          fi
          # server.json should already match (version-packages hook), but re-sync defensively.
          node scripts/sync-mcp-server-version.mjs
          curl -sSL "https://github.com/modelcontextprotocol/registry/releases/download/${MCP_PUBLISHER_VERSION}/mcp-publisher_linux_amd64.tar.gz" \
            | tar -xz -C /tmp mcp-publisher
          chmod +x /tmp/mcp-publisher
          /tmp/mcp-publisher login dns --domain=shineup.digital --private-key="$MCP_REGISTRY_DNS_KEY"
          /tmp/mcp-publisher validate packages/mcp/server.json
          /tmp/mcp-publisher publish packages/mcp/server.json
          echo "## MCP Registry" >> "$GITHUB_STEP_SUMMARY"
          echo "Published \`digital.shineup/appcn\` from packages/mcp/server.json." >> "$GITHUB_STEP_SUMMARY"

  dry-run:
    name: Manual dry-run (pack only)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build CLI + MCP
        run: pnpm --filter @app-cn/cli --filter @app-cn/mcp build

      - name: Pack @app-cn/ui
        run: pnpm --filter @app-cn/ui pack --pack-destination ./dist-tarball

      - name: Pack @app-cn/cli
        run: pnpm --filter @app-cn/cli pack --pack-destination ./dist-tarball

      - name: Pack @app-cn/mcp
        run: pnpm --filter @app-cn/mcp pack --pack-destination ./dist-tarball

      - name: Inspect tarballs
        run: |
          ls -la dist-tarball
          for tgz in dist-tarball/*.tgz; do
            echo "::group::$tgz"
            tar -tzf "$tgz" | head -40
            echo "::endgroup::"
          done

      - name: Fail if not a dry-run
        if: ${{ inputs.dry-run == false }}
        run: |
          echo "::error::dry-run=false on workflow_dispatch is intentionally disabled."
          echo "Use the push-driven Changesets flow for real publishes."
          exit 1
